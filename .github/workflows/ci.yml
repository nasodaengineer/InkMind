name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv venv && uv pip install ruff
      - run: uv run ruff check inkmind/ tests/
      - run: uv run ruff format --check inkmind/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv venv && uv pip install sqlalchemy aiosqlite pydantic pydantic-settings pytest pytest-asyncio httpx python-dotenv
      - run: uv run pytest tests/ -q
